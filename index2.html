<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubo 3D Interativo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       
        body {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }
       
        body.dragging {
            cursor: grabbing;
        }
       
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }
       
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #000000;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="info">
        <p>🎲 Cubo 3D Interativo</p>
        <p>Mova o mouse para girar</p>
    </div>
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
   
    <script>
        // Configuração da cena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
       
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 5);
       
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
       
        // Iluminação simples (sem sombreamento)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);
       
        // Criar grupo de cubos branco puro
        const cubeGroup = new THREE.Group();
        scene.add(cubeGroup);
       
        // Tamanho dos cubos menores
        const smallCubeSize = 0.6;
        const spacing = 0.05;
        const totalSize = smallCubeSize + spacing;
       
        // Criar matriz 3×3×3 de cubos (branco puro)
        for (let x = 0; x < 3; x++) {
            for (let y = 0; y < 3; y++) {
                for (let z = 0; z < 3; z++) {
                    const geometry = new THREE.BoxGeometry(smallCubeSize, smallCubeSize, smallCubeSize);
                    const material = new THREE.MeshBasicMaterial({
                        color: 0xffffff // Branco puro
                    });
                   
                    const cube = new THREE.Mesh(geometry, material);
                   
                    cube.position.x = (x - 1) * totalSize;
                    cube.position.y = (y - 1) * totalSize;
                    cube.position.z = (z - 1) * totalSize;
                   
                    // Adicionar borda preta
                    const edges = new THREE.EdgesGeometry(geometry);
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
                    cube.add(line);
                   
                    cubeGroup.add(cube);
                }
            }
        }
       
        // Variáveis de controle do mouse
        let mouseX = 0;
        let mouseY = 0;
       
        // Mouse move - segue as coordenadas do mouse
        document.addEventListener('mousemove', (e) => {
            // Normalizar coordenadas do mouse (-1 a 1)
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
           
            document.body.classList.add('dragging');
        });
       
        document.addEventListener('mouseleave', () => {
            document.body.classList.remove('dragging');
        });
       
        // Função de animação
        function animate() {
            requestAnimationFrame(animate);
           
            // Girar seguindo a posição do mouse
            cubeGroup.rotation.y = mouseX * 3;
            cubeGroup.rotation.x = mouseY * 3;
           
            renderer.render(scene, camera);
        }
       
        // Tratar redimensionamento da janela
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
       
        // Iniciar animação
        animate();
    </script>
</body>
</html>
